      tags: [Driver]
      security:
        - bearerAuth: []
      summary: Withdraw application
      parameters:
        - $ref: '#/components/parameters/ApplicationIdParam'
      responses:
        '200':
          description: Application withdrawn

  /api/trips/resources/assignable-orders:
    get:
      tags: [Trips]
      security:
        - bearerAuth: []
      summary: Get assignable orders for transporter
      responses:
        '200':
          description: Assignable orders fetched

  /api/trips/resources/available-drivers:
    get:
      tags: [Trips]
      security:
        - bearerAuth: []
      summary: Get available drivers for transporter
      responses:
        '200':
          description: Available drivers fetched

  /api/trips/resources/available-vehicles:
    get:
      tags: [Trips]
      security:
        - bearerAuth: []
      summary: Get available vehicles for transporter
      responses:
        '200':
          description: Available vehicles fetched

  /api/trips:
    post:
      tags: [Trips]
      security:
        - bearerAuth: []
      summary: Create trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripCreateInput'
            examples:
              valid:
                $ref: '#/components/examples/CreateTripRequest'
      responses:
        '201':
          description: Trip created
    get:
      tags: [Trips]
      security:
        - bearerAuth: []
      summary: List trips (transporter)
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: startDate
          schema:
            type: string
            format: date-time
        - in: query
          name: endDate
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Trips fetched

  /api/trips/{tripId}:
    get:
      tags: [Trips]
      security:
        - bearerAuth: []
      summary: Get trip details (transporter or assigned driver)
      parameters:
        - $ref: '#/components/parameters/TripIdParam'
      responses:
        '200':
          description: Trip details fetched
    put:
      tags: [Trips]
      security:
        - bearerAuth: []
      summary: Update trip (scheduled only)
      parameters:
        - $ref: '#/components/parameters/TripIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripUpdateInput'
      responses:
        '200':
          description: Trip updated
    delete:
      tags: [Trips]
      security:
        - bearerAuth: []
      summary: Delete trip (scheduled only)
      parameters:
        - $ref: '#/components/parameters/TripIdParam'
      responses:
        '200':
          description: Trip deleted

  /api/trips/{tripId}/cancel:
    post:
      tags: [Trips]
      security:
        - bearerAuth: []
      summary: Cancel trip
      parameters:
        - $ref: '#/components/parameters/TripIdParam'
      responses:
        '200':
          description: Trip cancelled

  /api/trips/{tripId}/complete:
    post:
      tags: [Trips]
      security:
        - bearerAuth: []
      summary: Complete trip
      parameters:
        - $ref: '#/components/parameters/TripIdParam'
      responses:
        '200':
          description: Trip completed

  /api/trips/driver/my-trips:
    get:
      tags: [Trips]
      security:
        - bearerAuth: []
      summary: Get assigned trips for authenticated driver
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: startDate
          schema:
            type: string
            format: date-time
        - in: query
          name: endDate
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Driver trips fetched

  /api/trips/driver/{tripId}:
    get:
      tags: [Trips]
      security:
        - bearerAuth: []
      summary: Get assigned trip details for authenticated driver
      parameters:
        - $ref: '#/components/parameters/TripIdParam'
      responses:
        '200':
          description: Driver trip details fetched

  /api/trips/driver/{tripId}/start:
    post:
      tags: [Trips]
      security:
        - bearerAuth: []
      summary: Start trip as assigned driver
      parameters:
        - $ref: '#/components/parameters/TripIdParam'
      responses:
        '200':
          description: Trip started

  /api/trips/driver/{tripId}/stops/{stopId}/confirm-pickup:
    post:
      tags: [Trips]
      security:
        - bearerAuth: []
      summary: Confirm pickup using OTP
      parameters:
        - $ref: '#/components/parameters/TripIdParam'
        - $ref: '#/components/parameters/StopIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpConfirmationInput'
      responses:
        '200':
          description: Pickup confirmed

  /api/trips/driver/{tripId}/stops/{stopId}/confirm-delivery:
    post:
      tags: [Trips]
      security:
        - bearerAuth: []
      summary: Confirm delivery using OTP
      parameters:
        - $ref: '#/components/parameters/TripIdParam'
        - $ref: '#/components/parameters/StopIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpConfirmationInput'
      responses:
        '200':
          description: Delivery confirmed

  /api/trips/driver/{tripId}/delay:
    post:
      tags: [Trips]
      security:
        - bearerAuth: []
      summary: Declare delay for active trip
      parameters:
        - $ref: '#/components/parameters/TripIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripDelayInput'
      responses:
        '200':
          description: Delay declared

  /api/trips/driver/{tripId}/clear-delay:
    post:
      tags: [Trips]
      security:
        - bearerAuth: []
      summary: Clear active delay stop
      parameters:
        - $ref: '#/components/parameters/TripIdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                stopId:
                  type: string
      responses:
        '200':
          description: Delay cleared

  /api/trips/driver/{tripId}/location:
    post:
      tags: [Trips]
      security:
        - bearerAuth: []
      summary: Update active trip location
      parameters:
        - $ref: '#/components/parameters/TripIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripLocationInput'
      responses:
        '200':
          description: Trip location updated

  /api/trips/track/{orderId}:
    get:
      tags: [Trips]
      security:
        - bearerAuth: []
      summary: Track trip progress for customer order
      parameters:
        - $ref: '#/components/parameters/OrderIdParam'
      responses:
        '200':
          description: Order tracking fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TokenParam:
      in: path
      name: token
      required: true
      schema:
        type: string
    OrderIdParam:
      in: path
      name: orderId
      required: true
      schema:
        type: string
    BidIdParam:
      in: path
      name: bidId
      required: true
      schema:
        type: string
    TruckIdParam:
      in: path
      name: truckId
      required: true
      schema:
        type: string
    VehicleIdParam:
      in: path
      name: vehicleId
      required: true
      schema:
        type: string
    DriverIdParam:
      in: path
      name: driverId
      required: true
      schema:
        type: string
    ApplicationIdParam:
      in: path
      name: applicationId
      required: true
      schema:
        type: string
    AddressIndexParam:
      in: path
      name: addressId
      required: true
      schema:
        type: integer
    PaymentIdParam:
      in: path
      name: paymentId
      required: true
      schema:
        type: string
    TransporterIdParam:
      in: path
      name: transporterId
      required: true
      schema:
        type: string
    IdParam:
      in: path
      name: id
      required: true
      schema:
        type: string
    RoleParam:
      in: path
      name: role
      required: true
      schema:
        type: string
        enum: [customer, transporter]
    BlockIdParam:
      in: path
      name: blockId
      required: true
      schema:
        type: string
    DocTypeParam:
      in: path
      name: docType
      required: true
      schema:
        type: string
    TripIdParam:
      in: path
      name: tripId
      required: true
      schema:
        type: string
    StopIdParam:
      in: path
      name: stopId
      required: true
      schema:
        type: string

  schemas:
    LoginRequest:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        role:
          type: string
          enum: [customer, transporter, driver, manager, admin]

    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string

    BasicSuccess:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string

    AuthSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/BasicSuccess'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuthTokens'

    GenericDataResponse:
      allOf:
        - $ref: '#/components/schemas/BasicSuccess'
        - type: object
          properties:
            data:
              type: object
              additionalProperties: true

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errorCode:
          type: string
        statusCode:
          type: integer
        data:
          type: object
          additionalProperties: true

    Address:
      type: object
      properties:
        street:
          type: string
        city:
          type: string
        state:
          type: string
        pin:
          type: string

    FleetVehicleInput:
      type: object
      required: [name, registration, capacity, manufacture_year, truck_type]
      properties:
        name:
          type: string
        registration:
          type: string
        capacity:
          type: number
        manufacture_year:
          type: integer
        truck_type:
          type: string
        last_service_date:
          type: string
          format: date

    ScheduleBlockInput:
      type: object
      required: [startTime, endTime]
      properties:
        title:
          type: string
        type:
          type: string
          enum: [maintenance, unavailable, trip]
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        notes:
          type: string

    TripCreateInput:
      type: object
      required: [stops]
      properties:
        order_ids:
          type: array
          items:
            type: string
        stops:
          type: array
          items:
            type: object
            additionalProperties: true
        planned_start_at:
          type: string
          format: date-time
        planned_end_at:
          type: string
          format: date-time
        assigned_vehicle_id:
          type: string
        assigned_driver_id:
          type: string
        total_distance_km:
          type: number
        total_duration_minutes:
          type: number

    TripUpdateInput:
      type: object
      properties:
        stops:
          type: array
          items:
            type: object
            additionalProperties: true
        planned_start_at:
          type: string
          format: date-time
        planned_end_at:
          type: string
          format: date-time
        total_distance_km:
          type: number
        total_duration_minutes:
          type: number

    OtpConfirmationInput:
      type: object
      required: [otp]
      properties:
        otp:
          type: string

    TripDelayInput:
      type: object
      required: [delay_minutes]
      properties:
        delay_minutes:
          type: number
        reason:
          type: string
        coordinates:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: number

    TripLocationInput:
      type: object
      required: [coordinates]
      properties:
        coordinates:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: number

