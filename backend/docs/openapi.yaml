openapi: 3.0.3
info:
  title: CargoLink API
  version: 1.0.0
  description: |
    OpenAPI specification for CargoLink backend.

    Scope included:
    - Auth
    - Customer
    - Transporter
    - Orders/Bids
    - Payments
    - Admin
    - Manager
    - Chat
    - Tickets
    - Location
    - Driver
    - Trips
servers:
  - url: http://localhost:3000
    description: Local development server
tags:
  - name: Auth
  - name: Customer
  - name: Transporter
  - name: Orders
  - name: Payments
  - name: Admin
  - name: Manager
  - name: Chat
  - name: Tickets
  - name: Location
  - name: Driver
  - name: Trips
paths:
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login user
      description: Login for customer/transporter/driver/manager/admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/refresh-token:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicSuccess'

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Forgot password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, userType]
              properties:
                email:
                  type: string
                  format: email
                userType:
                  type: string
                  enum: [customer, transporter]
      responses:
        '200':
          description: Temporary password sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicSuccess'

  /api/auth/google-login:
    post:
      tags: [Auth]
      summary: Login with Google credential
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [credential, role]
              properties:
                credential:
                  type: string
                role:
                  type: string
                  enum: [customer, transporter, driver]
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/auth/google-verify:
    post:
      tags: [Auth]
      summary: Verify Google credential and return email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [credential]
              properties:
                credential:
                  type: string
      responses:
        '200':
          description: Email extracted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BasicSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          email:
                            type: string
                            format: email

  /api/customers/register:
    post:
      tags: [Customer]
      summary: Register customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Customer registration payload validated by backend validator.
              additionalProperties: true
            examples:
              valid:
                $ref: '#/components/examples/CustomerSignupRequest'
      responses:
        '201':
          description: Customer registered and tokens returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/customers/dashboard-stats:
    get:
      tags: [Customer]
      security:
        - bearerAuth: []
      summary: Get customer dashboard stats
      responses:
        '200':
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/customers/profile:
    get:
      tags: [Customer]
      security:
        - bearerAuth: []
      summary: Get customer profile
      responses:
        '200':
          description: Profile fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'
    put:
      tags: [Customer]
      security:
        - bearerAuth: []
      summary: Update customer profile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                profilePicture:
                  type: string
                  format: binary
                firstName:
                  type: string
                lastName:
                  type: string
                phone:
                  type: string
                dob:
                  type: string
                  format: date
                gender:
                  type: string
            examples:
              basic:
                $ref: '#/components/examples/CustomerProfileUpdateRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/customers/password:
    patch:
      tags: [Customer]
      security:
        - bearerAuth: []
      summary: Change customer password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicSuccess'

  /api/customers/addresses:
    get:
      tags: [Customer]
      security:
        - bearerAuth: []
      summary: List customer addresses
      responses:
        '200':
          description: Address list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'
    post:
      tags: [Customer]
      security:
        - bearerAuth: []
      summary: Add customer address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Address'
      responses:
        '201':
          description: Address added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/customers/addresses/{addressId}:
    delete:
      tags: [Customer]
      security:
        - bearerAuth: []
      summary: Remove customer address by index
      parameters:
        - $ref: '#/components/parameters/AddressIndexParam'
      responses:
        '200':
          description: Address removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/transporters/register:
    post:
      tags: [Transporter]
      summary: Register transporter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            examples:
              valid:
                $ref: '#/components/examples/TransporterSignupRequest'
      responses:
        '201':
          description: Transporter registered and tokens returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'

  /api/transporters/{transporterId}/public-profile:
    get:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: Get transporter public profile
      parameters:
        - $ref: '#/components/parameters/TransporterIdParam'
      responses:
        '200':
          description: Public profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/transporters/documents:
    post:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: Upload transporter verification documents
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                pan_card:
                  type: string
                  format: binary
                driving_license:
                  type: string
                  format: binary
                vehicle_rc_0:
                  type: string
                  format: binary
                vehicle_rc_1:
                  type: string
                  format: binary
                vehicle_rc_2:
                  type: string
                  format: binary
                vehicle_rc_3:
                  type: string
                  format: binary
                vehicle_rc_4:
                  type: string
                  format: binary
                vehicle_rc_5:
                  type: string
                  format: binary
                vehicle_rc_6:
                  type: string
                  format: binary
                vehicle_rc_7:
                  type: string
                  format: binary
      responses:
        '200':
          description: Documents uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/transporters/verification-status:
    get:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: Get transporter verification status
      responses:
        '200':
          description: Verification status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/transporters/dashboard-stats:
    get:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: Get transporter dashboard stats
      responses:
        '200':
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/transporters/profile:
    get:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: Get transporter profile
      responses:
        '200':
          description: Profile fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'
    put:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: Update transporter profile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                profilePicture:
                  type: string
                  format: binary
                name:
                  type: string
                email:
                  type: string
                primary_contact:
                  type: string
                secondary_contact:
                  type: string
            examples:
              basic:
                $ref: '#/components/examples/TransporterProfileUpdateRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/transporters/password:
    patch:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: Change transporter password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicSuccess'

  /api/transporters/fleet:
    get:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: List fleet vehicles
      responses:
        '200':
          description: Fleet list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'
    post:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: Add fleet vehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FleetVehicleInput'
            examples:
              valid:
                $ref: '#/components/examples/AddTruckRequest'
      responses:
        '201':
          description: Vehicle added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/transporters/fleet/{truckId}:
    get:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: Get vehicle details
      parameters:
        - $ref: '#/components/parameters/TruckIdParam'
      responses:
        '200':
          description: Vehicle details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'
    put:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: Update vehicle
      parameters:
        - $ref: '#/components/parameters/TruckIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Vehicle updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'
    delete:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: Remove vehicle
      parameters:
        - $ref: '#/components/parameters/TruckIdParam'
      responses:
        '200':
          description: Vehicle removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/transporters/fleet/{vehicleId}/upload-rc:
    post:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: Upload RC for specific vehicle
      parameters:
        - $ref: '#/components/parameters/VehicleIdParam'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [rc_file]
              properties:
                rc_file:
                  type: string
                  format: binary
      responses:
        '200':
          description: RC uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/transporters/fleet/{truckId}/schedule:
    get:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: Get truck schedule blocks
      parameters:
        - $ref: '#/components/parameters/TruckIdParam'
        - in: query
          name: startDate
          schema:
            type: string
            format: date-time
        - in: query
          name: endDate
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Schedule blocks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/transporters/fleet/{truckId}/schedule/block:
    post:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: Add schedule block
      parameters:
        - $ref: '#/components/parameters/TruckIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleBlockInput'
      responses:
        '201':
          description: Block added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/transporters/fleet/{truckId}/schedule/block/{blockId}:
    delete:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: Remove schedule block
      parameters:
        - $ref: '#/components/parameters/TruckIdParam'
        - $ref: '#/components/parameters/BlockIdParam'
      responses:
        '200':
          description: Block removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicSuccess'

  /api/transporters/ratings:
    get:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: Get transporter ratings and reviews
      responses:
        '200':
          description: Ratings fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/transporters/drivers:
    get:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: List associated drivers
      responses:
        '200':
          description: Drivers fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/transporters/driver-requests:
    get:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: List pending driver applications
      responses:
        '200':
          description: Requests fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/transporters/driver-requests/{applicationId}/accept:
    post:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: Accept driver request
      parameters:
        - $ref: '#/components/parameters/ApplicationIdParam'
      responses:
        '200':
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/transporters/driver-requests/{applicationId}/reject:
    post:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: Reject driver request
      parameters:
        - $ref: '#/components/parameters/ApplicationIdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                rejectionReason:
                  type: string
      responses:
        '200':
          description: Request rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/transporters/drivers/{driverId}:
    delete:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: Remove driver from transporter company
      parameters:
        - $ref: '#/components/parameters/DriverIdParam'
      responses:
        '200':
          description: Driver removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicSuccess'

  /api/transporters/drivers/{driverId}/schedule:
    get:
      tags: [Transporter]
      security:
        - bearerAuth: []
      summary: Get a driver schedule
      parameters:
        - $ref: '#/components/parameters/DriverIdParam'
        - in: query
          name: startDate
          schema:
            type: string
            format: date-time
        - in: query
          name: endDate
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Driver schedule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/orders/estimate-price:
    post:
      tags: [Orders]
      security:
        - bearerAuth: []
      summary: Estimate order pricing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [distance, vehicle_type, weight]
              properties:
                distance:
                  type: number
                vehicle_type:
                  type: string
                weight:
                  type: number
                volume:
                  type: number
                goods_type:
                  type: string
                cargo_value:
                  type: number
                insurance_tier:
                  type: string
                originCoords:
                  type: object
                  properties:
                    lat:
                      type: number
                    lng:
                      type: number
                destCoords:
                  type: object
                  properties:
                    lat:
                      type: number
                    lng:
                      type: number
      responses:
        '200':
          description: Price estimate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/orders/my-orders:
    get:
      tags: [Orders]
      security:
        - bearerAuth: []
      summary: Get authenticated user orders (customer/transporter)
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
      responses:
        '200':
          description: Orders fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/orders/available:
    get:
      tags: [Orders]
      security:
        - bearerAuth: []
      summary: List available orders for transporter bidding
      responses:
        '200':
          description: Available orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/orders/my-bids:
    get:
      tags: [Orders]
      security:
        - bearerAuth: []
      summary: List transporter bids
      responses:
        '200':
          description: Bids fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'

  /api/orders:
    post:
      tags: [Orders]
      security:
        - bearerAuth: []
      summary: Place new order
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - pickup
                - delivery
                - scheduled_at
                - distance
                - max_price
                - goods_type
                - weight
                - truck_type
                - description
              properties:
                pickup:
                  type: string
                  description: JSON stringified pickup object
                delivery:
                  type: string
                  description: JSON stringified delivery object
                pickup_coordinates:
                  type: string
                  description: JSON stringified coordinates object
                delivery_coordinates:
                  type: string
                  description: JSON stringified coordinates object
                scheduled_at:
                  type: string
                  format: date-time
                distance:
                  type: number
                max_price:
                  type: number
                goods_type:
                  type: string
                weight:
                  type: number
                volume:
                  type: number
                cargo_value:
                  type: number
                truck_type:
                  type: string
                description:
                  type: string
                special_instructions:
                  type: string
                shipments:
                  type: string
                  description: JSON stringified shipment array
                cargo_photo:
                  type: string
                  format: binary
            examples:
              shipmentOrder:
                $ref: '#/components/examples/PlaceOrderRequest'
      responses:
        '201':
          description: Order placed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BasicSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          orderId:
                            type: string

  /api/orders/{orderId}:
    get:
      tags: [Orders]
      security:
        - bearerAuth: []
      summary: Get order details (customer/transporter role-filtered)
      parameters:
        - $ref: '#/components/parameters/OrderIdParam'
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'
    delete:
      tags: [Orders]
      security:
        - bearerAuth: []
      summary: Cancel order (customer)
      parameters:
        - $ref: '#/components/parameters/OrderIdParam'
      responses:
        '200':
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicSuccess'

  /api/orders/{orderId}/bids:
    get:
      tags: [Orders]
      security:
        - bearerAuth: []
      summary: Get bids for an order (customer)
      parameters:
        - $ref: '#/components/parameters/OrderIdParam'
      responses:
        '200':
          description: Bids list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericDataResponse'
    post:
      tags: [Orders]
      security:
        - bearerAuth: []
      summary: Submit bid for an order (transporter)
      parameters:
        - $ref: '#/components/parameters/OrderIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bidAmount]
              properties:
                bidAmount:
                  type: number
                notes:
                  type: string
                quoteBreakdown:
                  type: object
                  additionalProperties: true
            examples:
              valid:
                $ref: '#/components/examples/PlaceBidRequest'
      responses:
        '201':
          description: Bid submitted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BasicSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          bidId:
                            type: string

  /api/orders/{orderId}/bids/{bidId}/quote-pdf:
    get:
      tags: [Orders]
      security:
        - bearerAuth: []
      summary: Download bid quote PDF
      parameters:
        - $ref: '#/components/parameters/OrderIdParam'
        - $ref: '#/components/parameters/BidIdParam'
      responses:
        '200':
          description: PDF stream
          content:
            application/pdf:
              schema:
                type: string
                format: binary

