# ═══════════════════════════════════════════════════════════════════════════════
# CargoLink — Cloud Build CI/CD
# Trigger: Push to main branch
#
# Pipeline:
#   1. Build & push backend Docker image → Artifact Registry
#   2. Deploy backend to Cloud Run (asia-south1)
#   3. Build frontend (Vite) → deploy to App Engine (frontend service)
#   4. Update dispatch rules
# ═══════════════════════════════════════════════════════════════════════════════

timeout: 1200s

options:
  logging: CLOUD_LOGGING_ONLY
  substitution_option: ALLOW_LOOSE

substitutions:
  _REGION: asia-south1
  _BACKEND_IMAGE: "asia-south1-docker.pkg.dev/${PROJECT_ID}/cargolink-docker/cargolink-backend"
  _CLOUD_RUN_SERVICE: cargolink-backend
  _GCS_BUCKET: cargolink-uploads-489712
  _VPC_CONNECTOR: cargolink-vpc
  _REDIS_HOST: "10.14.52.243"   # Memorystore Redis IP (asia-south1)

steps:
  # ── 0.1: Install backend deps & Test ───────────────────────────────────────
  - id: backend-install-test
    name: node:22
    entrypoint: npm
    dir: backend
    args: ["install", "--prefer-offline", "--no-audit"]

  - id: backend-test
    name: node:22
    entrypoint: npm
    dir: backend
    args: ["test"]
    waitFor: ["backend-install-test"]

  # ── 0.2: Install frontend deps & Test ──────────────────────────────────────
  - id: frontend-install-test
    name: node:22
    entrypoint: npm
    dir: frontend
    args: ["install", "--prefer-offline", "--no-audit"]
    waitFor: ["-"]

  - id: frontend-test
    name: node:22
    entrypoint: npm
    dir: frontend
    args: ["test"]
    waitFor: ["frontend-install-test"]

  # ── 1: Build backend Docker image ──────────────────────────────────────────
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    dir: backend
    waitFor: ["backend-test", "frontend-test"]
    args:
      - build
      - -t
      - "${_BACKEND_IMAGE}:${SHORT_SHA}"
      - -t
      - "${_BACKEND_IMAGE}:latest"
      - .

  # ── 2: Push backend image to Artifact Registry ─────────────────────────────
  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - "${_BACKEND_IMAGE}"
    waitFor: ["build-backend"]

  # ── 3: Fetch Redis IP for Cloud Run deployment ─────────────────────────────
  - id: fetch-redis-ip
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    waitFor: ["-"]
    args:
      - -ceu
      - |
        REDIS_IP=$$(gcloud redis instances describe cargolink-redis \
          --region=${_REGION} --format="get(host)" 2>/dev/null || echo "")
        echo -n "$${REDIS_IP}" > /workspace/.redis-ip
        if [ -n "$${REDIS_IP}" ]; then
          echo "Redis IP: $${REDIS_IP}"
        else
          echo "WARNING: No Redis instance found. Cache will be disabled."
        fi

  # ── 4: Deploy backend to Cloud Run (MAIN ONLY) ─────────────────────────────
  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    waitFor: ["push-backend", "backend-test"]
    args:
      - -ceu
      - |
        if [ "${BRANCH_NAME:-main}" != "main" ] && [ "${BRANCH_NAME:-main}" != "master" ] && [ "${BRANCH_NAME:-main}" != "ci/cd" ]; then
          echo "Skipping backend deployment for branch: ${BRANCH_NAME:-unknown}"
          exit 0
        fi

        SECRETS="MONGO_URI=MONGO_URI:latest,JWT_ACCESS_SECRET=JWT_ACCESS_SECRET:latest,JWT_REFRESH_SECRET=JWT_REFRESH_SECRET:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,ADMIN_EMAIL=ADMIN_EMAIL:latest,ADMIN_PASSWORD=ADMIN_PASSWORD:latest,RAZORPAY_KEY_ID=RAZORPAY_KEY_ID:latest,RAZORPAY_KEY_SECRET=RAZORPAY_KEY_SECRET:latest,GOOGLE_MAPS_API_KEY=GOOGLE_MAPS_API_KEY:latest"

        gcloud run deploy ${_CLOUD_RUN_SERVICE} \
          --image "${_BACKEND_IMAGE}:${SHORT_SHA}" \
          --platform managed \
          --region ${_REGION} \
          --allow-unauthenticated \
          --port 8080 \
          --vpc-connector ${_VPC_CONNECTOR} \
          --set-env-vars "NODE_ENV=production,CACHE_ENABLED=true,GCS_BUCKET=${_GCS_BUCKET},REDIS_HOST=${_REDIS_HOST},REDIS_PORT=6379,CORS_ALLOWED_ORIGINS=https://cargolink.muthuraja.tech" \
          --update-secrets "$${SECRETS}" \
          --memory 512Mi \
          --cpu 1 \
          --min-instances 0 \
          --max-instances 5 \
          --quiet

        URL=$$(gcloud run services describe ${_CLOUD_RUN_SERVICE} \
          --region=${_REGION} --format="get(status.url)")
        echo "========================================="
        echo "  Backend deployed: $${URL}"
        echo "========================================="
        echo -n "$${URL}" > /workspace/.backend-url

  # ── 5: Install frontend deps ───────────────────────────────────────────────
  - id: frontend-install
    name: node:22
    entrypoint: npm
    dir: frontend
    args: ["ci", "--prefer-offline", "--no-audit"]
    waitFor: ["-"]

  # ── 6: Fetch frontend secrets ──────────────────────────────────────────────
  - id: fetch-frontend-secrets
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    waitFor: ["-"]
    args:
      - -ceu
      - |
        CLIENT_ID="$$(gcloud secrets versions access latest --secret=GOOGLE_CLIENT_ID | tr -d '\n')"
        MAPS_KEY="$$(gcloud secrets versions access latest --secret=GOOGLE_MAPS_API_KEY | tr -d '\n')"
        echo "" >> frontend/.env
        echo "VITE_GOOGLE_CLIENT_ID=$${CLIENT_ID}" >> frontend/.env
        echo "VITE_GOOGLE_MAPS_API_KEY=$${MAPS_KEY}" >> frontend/.env
        echo "Frontend secrets fetched."

  # ── 7: Build frontend ─────────────────────────────────────────────────────
  - id: frontend-build
    name: node:22
    entrypoint: npm
    dir: frontend
    args: ["run", "build"]
    waitFor: ["frontend-install", "fetch-frontend-secrets"]

  # ── 8: Deploy frontend to App Engine (MAIN ONLY) ───────────────────────────
  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    waitFor: ["frontend-build"]
    args:
      - -ceu
      - |
        if [ "${BRANCH_NAME:-main}" != "main" ] && [ "${BRANCH_NAME:-main}" != "master" ] && [ "${BRANCH_NAME:-main}" != "ci/cd" ]; then
          echo "Skipping frontend deployment for branch: ${BRANCH_NAME:-unknown}"
          exit 0
        fi

        VERSION="cl-${SHORT_SHA}"
        gcloud app deploy frontend/app.yaml --version="$${VERSION}" --no-promote --quiet

  # ── 9: Promote frontend traffic (MAIN ONLY) ────────────────────────────────
  - id: promote-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    waitFor: ["deploy-frontend", "deploy-backend"]
    args:
      - -ceu
      - |
        if [ "${BRANCH_NAME:-main}" != "main" ] && [ "${BRANCH_NAME:-main}" != "master" ] && [ "${BRANCH_NAME:-main}" != "ci/cd" ]; then
          echo "Skipping traffic shift for branch: ${BRANCH_NAME:-unknown}"
          exit 0
        fi

        VERSION="cl-${SHORT_SHA}"
        gcloud app services set-traffic frontend --splits "$${VERSION}=1" --quiet
        BACKEND_URL=$$(cat /workspace/.backend-url || echo "N/A")
        echo "========================================"
        echo "  SUCCESS — version: $${VERSION}"
        echo "  Backend:  $${BACKEND_URL}"
        echo "  Frontend: https://cargolink.muthuraja.tech"
        echo "========================================"

images:
  - "${_BACKEND_IMAGE}:${SHORT_SHA}"
  - "${_BACKEND_IMAGE}:latest"
