# ═══════════════════════════════════════════════════════════════════════════════
# CargoLink — Cloud Build CI/CD
# Trigger: Push to main branch
#
# Pipeline:
#   0. Detect changed paths and select deploy scope
#   1. Build/test/deploy backend only when backend changed
#   2. Build/test/deploy frontend only when frontend changed
#   3. Skip untouched side automatically
# ═══════════════════════════════════════════════════════════════════════════════

timeout: 1200s

options:
  logging: CLOUD_LOGGING_ONLY
  substitution_option: ALLOW_LOOSE

substitutions:
  _REGION: asia-south1
  _DEPLOY_SCOPE: auto
  _BACKEND_IMAGE: "asia-south1-docker.pkg.dev/${PROJECT_ID}/cargolink-docker/cargolink-backend"
  _CLOUD_RUN_SERVICE: cargolink-backend
  _GCS_BUCKET: cargolink-uploads-489712
  _VPC_CONNECTOR: cargolink-vpc
  _REDIS_HOST: "10.14.52.243"   # Memorystore Redis IP (asia-south1)

steps:
  # ── 0: Detect changed paths & resolve deploy scope ─────────────────────────
  - id: detect-changes
    name: gcr.io/cloud-builders/git
    entrypoint: bash
    args:
      - -ceu
      - |
        SCOPE="${_DEPLOY_SCOPE:-auto}"
        BACKEND_CHANGED=0
        FRONTEND_CHANGED=0

        if [ "$${SCOPE}" = "backend" ]; then
          BACKEND_CHANGED=1
        elif [ "$${SCOPE}" = "frontend" ]; then
          FRONTEND_CHANGED=1
        elif [ "$${SCOPE}" = "both" ]; then
          BACKEND_CHANGED=1
          FRONTEND_CHANGED=1
        elif [ "$${SCOPE}" = "auto" ] || [ -z "$${SCOPE}" ]; then
          CHANGED_FILES="$$(git show --name-only --pretty='' "${COMMIT_SHA:-HEAD}" | sed '/^$/d' || true)"
          echo "$${CHANGED_FILES}" > /workspace/.changed-files

          if [ -z "$${CHANGED_FILES}" ]; then
            BACKEND_CHANGED=1
            FRONTEND_CHANGED=1
          fi

          if echo "$${CHANGED_FILES}" | grep -Eq '^backend/'; then
            BACKEND_CHANGED=1
          fi
          if echo "$${CHANGED_FILES}" | grep -Eq '^frontend/'; then
            FRONTEND_CHANGED=1
          fi

          # Shared deployment files affect both sides.
          if echo "$${CHANGED_FILES}" | grep -Eq '^(cloudbuild.yaml|dispatch.yaml)$'; then
            BACKEND_CHANGED=1
            FRONTEND_CHANGED=1
          fi
        else
          echo "Invalid _DEPLOY_SCOPE=$${SCOPE}. Use auto|backend|frontend|both"
          exit 1
        fi

        echo -n "$${BACKEND_CHANGED}" > /workspace/.backend-changed
        echo -n "$${FRONTEND_CHANGED}" > /workspace/.frontend-changed
        echo "Deploy scope: $${SCOPE}"
        echo "backend_changed=$${BACKEND_CHANGED} frontend_changed=$${FRONTEND_CHANGED}"

  # ── 0.1: Install backend deps & Test ───────────────────────────────────────
  - id: backend-install-test
    name: node:22
    entrypoint: bash
    dir: backend
    waitFor: ["detect-changes"]
    args:
      - -ceu
      - |
        if [ "$$(cat /workspace/.backend-changed 2>/dev/null || echo 0)" != "1" ]; then
          echo "Skipping backend install (no backend changes)."
          exit 0
        fi
        npm install --prefer-offline --no-audit

  - id: backend-test
    name: node:22
    entrypoint: bash
    dir: backend
    waitFor: ["backend-install-test"]
    args:
      - -ceu
      - |
        if [ "$$(cat /workspace/.backend-changed 2>/dev/null || echo 0)" != "1" ]; then
          echo "Skipping backend tests (no backend changes)."
          exit 0
        fi
        npm test

  # ── 0.2: Install frontend deps & Test ──────────────────────────────────────
  - id: frontend-install-test
    name: node:22
    entrypoint: bash
    dir: frontend
    waitFor: ["detect-changes"]
    args:
      - -ceu
      - |
        if [ "$$(cat /workspace/.frontend-changed 2>/dev/null || echo 0)" != "1" ]; then
          echo "Skipping frontend install (no frontend changes)."
          exit 0
        fi
        npm install --prefer-offline --no-audit

  - id: frontend-test
    name: node:22
    entrypoint: bash
    dir: frontend
    waitFor: ["frontend-install-test"]
    args:
      - -ceu
      - |
        if [ "$$(cat /workspace/.frontend-changed 2>/dev/null || echo 0)" != "1" ]; then
          echo "Skipping frontend tests (no frontend changes)."
          exit 0
        fi
        npm test

  # ── 1: Build backend Docker image ──────────────────────────────────────────
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    dir: backend
    waitFor: ["backend-test"]
    args:
      - -ceu
      - |
        if [ "$$(cat /workspace/.backend-changed 2>/dev/null || echo 0)" != "1" ]; then
          echo "Skipping backend image build (no backend changes)."
          exit 0
        fi
        docker build \
          -t "${_BACKEND_IMAGE}:${SHORT_SHA}" \
          -t "${_BACKEND_IMAGE}:latest" \
          .

  # ── 2: Push backend image to Artifact Registry ─────────────────────────────
  - id: push-backend
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -ceu
      - |
        if [ "$$(cat /workspace/.backend-changed 2>/dev/null || echo 0)" != "1" ]; then
          echo "Skipping backend image push (no backend changes)."
          exit 0
        fi
        docker push --all-tags "${_BACKEND_IMAGE}"
    waitFor: ["build-backend"]

  # ── 3: Fetch Redis IP for Cloud Run deployment ─────────────────────────────
  - id: fetch-redis-ip
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    waitFor: ["-"]
    args:
      - -ceu
      - |
        REDIS_IP=$$(gcloud redis instances describe cargolink-redis \
          --region=${_REGION} --format="get(host)" 2>/dev/null || echo "")
        echo -n "$${REDIS_IP}" > /workspace/.redis-ip
        if [ -n "$${REDIS_IP}" ]; then
          echo "Redis IP: $${REDIS_IP}"
        else
          echo "WARNING: No Redis instance found. Cache will be disabled."
        fi

  # ── 4: Deploy backend to Cloud Run (MAIN ONLY) ─────────────────────────────
  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    waitFor: ["push-backend", "backend-test"]
    args:
      - -ceu
      - |
        if [ "${BRANCH_NAME:-main}" != "main" ] && [ "${BRANCH_NAME:-main}" != "master" ] && [ "${BRANCH_NAME:-main}" != "ci/cd" ]; then
          echo "Skipping backend deployment for branch: ${BRANCH_NAME:-unknown}"
          exit 0
        fi

        if [ "$$(cat /workspace/.backend-changed 2>/dev/null || echo 0)" != "1" ]; then
          echo "Skipping backend deployment (no backend changes)."
          URL=$$(gcloud run services describe ${_CLOUD_RUN_SERVICE} \
            --region=${_REGION} --format="get(status.url)" 2>/dev/null || echo "")
          if [ -n "$${URL}" ]; then
            echo -n "$${URL}" > /workspace/.backend-url
          fi
          exit 0
        fi

        SECRETS="MONGO_URI=MONGO_URI:latest,JWT_ACCESS_SECRET=JWT_ACCESS_SECRET:latest,JWT_REFRESH_SECRET=JWT_REFRESH_SECRET:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,ADMIN_EMAIL=ADMIN_EMAIL:latest,ADMIN_PASSWORD=ADMIN_PASSWORD:latest,RAZORPAY_KEY_ID=RAZORPAY_KEY_ID:latest,RAZORPAY_KEY_SECRET=RAZORPAY_KEY_SECRET:latest,GOOGLE_MAPS_API_KEY=GOOGLE_MAPS_API_KEY:latest"

        gcloud run deploy ${_CLOUD_RUN_SERVICE} \
          --image "${_BACKEND_IMAGE}:${SHORT_SHA}" \
          --platform managed \
          --region ${_REGION} \
          --allow-unauthenticated \
          --port 8080 \
          --no-use-http2 \
          --timeout 3600 \
          --session-affinity \
          --concurrency 1000 \
          --vpc-connector ${_VPC_CONNECTOR} \
          --set-env-vars "NODE_ENV=production,CACHE_ENABLED=true,GCS_BUCKET=${_GCS_BUCKET},REDIS_HOST=${_REDIS_HOST},REDIS_PORT=6379,CORS_ALLOWED_ORIGINS=https://cargolink.muthuraja.tech" \
          --update-secrets "$${SECRETS}" \
          --memory 512Mi \
          --cpu 1 \
          --min-instances 1 \
          --max-instances 5 \
          --quiet

        URL=$$(gcloud run services describe ${_CLOUD_RUN_SERVICE} \
          --region=${_REGION} --format="get(status.url)")
        echo "========================================="
        echo "  Backend deployed: $${URL}"
        echo "========================================="
        echo -n "$${URL}" > /workspace/.backend-url

  # ── 5: Fetch frontend secrets ──────────────────────────────────────────────
  - id: fetch-frontend-secrets
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    waitFor: ["deploy-backend"]
    args:
      - -ceu
      - |
        if [ "$$(cat /workspace/.frontend-changed 2>/dev/null || echo 0)" != "1" ]; then
          echo "Skipping frontend secret preparation (no frontend changes)."
          exit 0
        fi

        CLIENT_ID="$$(gcloud secrets versions access latest --secret=GOOGLE_CLIENT_ID | tr -d '\n')"
        MAPS_KEY="$$(gcloud secrets versions access latest --secret=GOOGLE_MAPS_API_KEY | tr -d '\n')"

        BACKEND_URL="$$(cat /workspace/.backend-url 2>/dev/null | tr -d '\n')"
        if [ -z "$${BACKEND_URL}" ]; then
          BACKEND_URL="$$(gcloud run services describe ${_CLOUD_RUN_SERVICE} --region=${_REGION} --format='get(status.url)' 2>/dev/null | tr -d '\n')"
        fi

        : > frontend/.env
        echo "VITE_GOOGLE_CLIENT_ID=$${CLIENT_ID}" >> frontend/.env
        echo "VITE_GOOGLE_MAPS_API_KEY=$${MAPS_KEY}" >> frontend/.env
        if [ -n "$${BACKEND_URL}" ]; then
          echo "VITE_API_BASE_URL=$${BACKEND_URL}" >> frontend/.env
          echo "Frontend secrets fetched and API base URL injected."
        else
          echo "WARN: Backend URL not found (likely non-deploy branch). Using relative API paths."
        fi

  # ── 6: Build frontend ─────────────────────────────────────────────────────
  - id: frontend-build
    name: node:22
    entrypoint: bash
    dir: frontend
    waitFor: ["frontend-test", "fetch-frontend-secrets"]
    args:
      - -ceu
      - |
        if [ "$$(cat /workspace/.frontend-changed 2>/dev/null || echo 0)" != "1" ]; then
          echo "Skipping frontend build (no frontend changes)."
          exit 0
        fi
        npm run build

  # ── 7: Deploy frontend to App Engine (MAIN ONLY) ───────────────────────────
  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    waitFor: ["frontend-build"]
    args:
      - -ceu
      - |
        if [ "$$(cat /workspace/.frontend-changed 2>/dev/null || echo 0)" != "1" ]; then
          echo "Skipping frontend deployment (no frontend changes)."
          exit 0
        fi

        if [ "${BRANCH_NAME:-main}" != "main" ] && [ "${BRANCH_NAME:-main}" != "master" ] && [ "${BRANCH_NAME:-main}" != "ci/cd" ]; then
          echo "Skipping frontend deployment for branch: ${BRANCH_NAME:-unknown}"
          exit 0
        fi

        VERSION="cl-${SHORT_SHA}"
        gcloud app deploy frontend/app.yaml --version="$${VERSION}" --no-promote --quiet

  # ── 8: Promote frontend traffic (MAIN ONLY) ────────────────────────────────
  - id: promote-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    waitFor: ["deploy-frontend", "deploy-backend"]
    args:
      - -ceu
      - |
        if [ "$$(cat /workspace/.frontend-changed 2>/dev/null || echo 0)" != "1" ]; then
          echo "Skipping frontend traffic promotion (no frontend changes)."
          exit 0
        fi

        if [ "${BRANCH_NAME:-main}" != "main" ] && [ "${BRANCH_NAME:-main}" != "master" ] && [ "${BRANCH_NAME:-main}" != "ci/cd" ]; then
          echo "Skipping traffic shift for branch: ${BRANCH_NAME:-unknown}"
          exit 0
        fi

        VERSION="cl-${SHORT_SHA}"
        gcloud app services set-traffic frontend --splits "$${VERSION}=1" --quiet
        BACKEND_URL=$$(cat /workspace/.backend-url || echo "N/A")
        echo "========================================"
        echo "  SUCCESS — version: $${VERSION}"
        echo "  Backend:  $${BACKEND_URL}"
        echo "  Frontend: https://cargolink.muthuraja.tech"
        echo "========================================"
