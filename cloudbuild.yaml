timeout: 1200s

options:
  logging: CLOUD_LOGGING_ONLY
  substitution_option: ALLOW_LOOSE

substitutions:
  _MONGO_URI_SECRET_NAME: MONGO_URI

steps:
  # ── 0: Install backend deps ──────────────────────────────────────────────
  - id: backend-install
    name: node:22
    entrypoint: npm
    dir: backend
    args: ["ci", "--prefer-offline", "--no-audit"]

  # ── 1: Install frontend deps (parallel with backend) ────────────────────
  - id: frontend-install
    name: node:22
    entrypoint: npm
    dir: frontend
    args: ["ci", "--prefer-offline", "--no-audit"]
    waitFor: ["-"]

  # ── 2: Fetch frontend secrets ─────────────────────────────────────────────
  - id: fetch-frontend-secrets
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        CLIENT_ID="$$(gcloud secrets versions access latest --secret=GOOGLE_CLIENT_ID | tr -d '\n')"
        MAPS_KEY="$$(gcloud secrets versions access latest --secret=GOOGLE_MAPS_API_KEY | tr -d '\n')"
        echo "" >> frontend/.env
        echo "VITE_GOOGLE_CLIENT_ID=$${CLIENT_ID}" >> frontend/.env
        echo "VITE_GOOGLE_MAPS_API_KEY=$${MAPS_KEY}" >> frontend/.env
        echo "Frontend secrets successfully fetched and appended to .env."

  # ── 3: Build frontend ────────────────────────────────────────────────────
  - id: frontend-build
    name: node:22
    entrypoint: npm
    dir: frontend
    args: ["run", "build"]
    waitFor: ["frontend-install", "fetch-frontend-secrets"]

  # ── 3: Verify MONGO_URI secret is accessible ─────────────────────────────
  - id: verify-secret
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    waitFor: ["backend-install", "frontend-build"]
    args:
      - -ceu
      - |
        gcloud secrets versions access latest --secret="${_MONGO_URI_SECRET_NAME}" > /dev/null
        echo "Secret ${_MONGO_URI_SECRET_NAME} is accessible."

  # ── 4: Compute short version ID from git SHA ─────────────────────────────
  - id: compute-version
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    waitFor: ["verify-secret"]
    args:
      - -ceu
      - |
        VERSION="cl-${SHORT_SHA}"
        echo -n "$${VERSION}" > /workspace/.gae-version
        echo "Version: $${VERSION}"

  # ── 5 & 6: Deploy backend + frontend in parallel (no traffic yet) ────────
  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    waitFor: ["compute-version"]
    args:
      - -ceu
      - |
        VERSION="$(cat /workspace/.gae-version)"
        gcloud app deploy backend/app.yaml --version="$${VERSION}" --no-promote --quiet

  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    waitFor: ["compute-version"]
    args:
      - -ceu
      - |
        VERSION="$(cat /workspace/.gae-version)"
        gcloud app deploy frontend/app.yaml --version="$${VERSION}" --no-promote --quiet

  # ── 7: Deploy dispatch rules ─────────────────────────────────────────────
  - id: deploy-dispatch
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    waitFor: ["deploy-backend", "deploy-frontend"]
    args:
      - -ceu
      - |
        gcloud app deploy dispatch.yaml --quiet

  # ── 8: Promote 100% traffic to the new version ───────────────────────────
  - id: promote-traffic
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    waitFor: ["deploy-dispatch"]
    args:
      - -ceu
      - |
        VERSION="$(cat /workspace/.gae-version)"
        gcloud app services set-traffic default  --splits "$${VERSION}=1" --quiet
        gcloud app services set-traffic frontend --splits "$${VERSION}=1" --quiet
        echo "========================================"
        echo "  SUCCESS — version: $${VERSION}"
        echo "  URL: https://cargolink-489712.el.r.appspot.com"
        echo "========================================"
